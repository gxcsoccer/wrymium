<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wrymium + Tauri</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0; padding: 40px;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #eee; min-height: 100vh; box-sizing: border-box;
    }
    h1 { color: #f7971e; margin-bottom: 8px; }
    .subtitle { color: #a8dadc; margin-bottom: 32px; }
    .card {
      background: rgba(255,255,255,0.08); border-radius: 12px;
      padding: 24px; margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .card h3 { margin-top: 0; color: #ffd93d; }
    code { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; font-size: 14px; }
    button {
      padding: 10px 20px; font-size: 15px; cursor: pointer;
      background: #e94560; color: #fff; border: none; border-radius: 8px; margin: 4px;
    }
    button:hover { background: #c73851; }
    input {
      padding: 10px; font-size: 15px; border-radius: 8px; border: 1px solid #555;
      background: rgba(0,0,0,0.3); color: #eee; width: 200px;
    }
    .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .status.ok { background: #2ecc71; color: #000; }
    .status.fail { background: #e74c3c; color: #fff; }
    .status.pending { background: #f39c12; color: #000; }
    #log {
      margin-top: 16px; padding: 16px; background: rgba(0,0,0,0.4);
      border-radius: 8px; font-family: monospace; font-size: 13px;
      white-space: pre-wrap; min-height: 100px; max-height: 300px; overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>Wrymium + Tauri</h1>
  <p class="subtitle">CEF-powered WebView rendering this Tauri app</p>

  <div class="card">
    <h3>Runtime Info</h3>
    <p>User Agent: <code id="ua"></code></p>
    <p>URL: <code id="url"></code></p>
  </div>

  <div class="card">
    <h3>Checks</h3>
    <p>Chromium engine: <span id="check-chromium" class="status pending">checking...</span></p>
    <p>window.__TAURI_INTERNALS__: <span id="check-tauri" class="status pending">checking...</span></p>
    <p>window.ipc: <span id="check-ipc" class="status pending">checking...</span></p>
    <p>invoke() IPC: <span id="check-invoke" class="status pending">not tested</span></p>
  </div>

  <div class="card">
    <h3>Test invoke()</h3>
    <input type="text" id="name-input" value="wrymium" placeholder="Enter name">
    <button onclick="testInvoke()">Call greet command</button>
    <button onclick="benchmarkIPC()">Benchmark (100 calls)</button>
    <p id="greet-result" style="margin-top:12px;color:#2ecc71;font-size:16px;"></p>
  </div>

  <div class="card">
    <h3>Console</h3>
    <div id="log"></div>
  </div>

  <script>
    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(id, ok, text) {
      const el = document.getElementById(id);
      el.className = 'status ' + (ok ? 'ok' : 'fail');
      el.textContent = text || (ok ? 'OK' : 'Failed');
    }

    document.getElementById('ua').textContent = navigator.userAgent;
    document.getElementById('url').textContent = location.href;

    const isChromium = !!window.chrome || navigator.userAgent.includes('Chrome');
    setStatus('check-chromium', isChromium, isChromium ? 'Chromium/CEF' : 'Not Chromium');
    log(isChromium ? '[OK] Running on Chromium/CEF' : '[WARN] Not Chromium');

    setTimeout(() => {
      const hasTauri = !!window.__TAURI_INTERNALS__;
      setStatus('check-tauri', hasTauri, hasTauri ? 'Available' : 'Not found');
      log(hasTauri ? '[OK] __TAURI_INTERNALS__ available' : '[WARN] __TAURI_INTERNALS__ not found');

      const hasIpc = !!(window.ipc && typeof window.ipc.postMessage === 'function');
      setStatus('check-ipc', hasIpc, hasIpc ? 'Available' : 'Not found');
      log(hasIpc ? '[OK] window.ipc.postMessage active' : '[WARN] window.ipc not available');

      // Auto-test invoke
      if (hasTauri && window.__TAURI_INTERNALS__.invoke) {
        testInvoke();
      }
    }, 1500);

    async function benchmarkIPC() {
      const el = document.getElementById('greet-result');
      const N = 100;
      el.textContent = 'Running ' + N + ' invoke() calls...';
      log('[BENCH] Starting ' + N + ' sequential invoke() calls...');
      const start = performance.now();
      for (let i = 0; i < N; i++) {
        await window.__TAURI_INTERNALS__.invoke('greet', { name: 'bench' });
      }
      const elapsed = performance.now() - start;
      const avg = (elapsed / N).toFixed(2);
      const msg = N + ' calls in ' + elapsed.toFixed(0) + 'ms — avg ' + avg + 'ms/call';
      el.textContent = msg;
      log('[BENCH] ' + msg);
    }

    async function testInvoke() {
      const name = document.getElementById('name-input').value || 'world';
      log('[INVOKE] Calling greet("' + name + '")...');

      try {
        if (!window.__TAURI_INTERNALS__ || !window.__TAURI_INTERNALS__.invoke) {
          throw new Error('__TAURI_INTERNALS__.invoke not available');
        }

        const result = await window.__TAURI_INTERNALS__.invoke('greet', { name });
        log('[RESULT] ' + JSON.stringify(result));
        setStatus('check-invoke', true, 'Working!');
        document.getElementById('greet-result').textContent = result;
      } catch (err) {
        log('[ERROR] invoke failed: ' + err.message);
        log('[DEBUG] Error details: ' + JSON.stringify(err, null, 2));
        setStatus('check-invoke', false, 'Failed: ' + err.message);
      }
    }
  </script>
</body>
</html>
