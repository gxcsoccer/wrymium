<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Scroll Test</title>
<style>body { margin: 0; } .section { height: 1000px; padding: 20px; } button { padding: 10px 20px; }</style>
</head>
<body>
  <div class="section" style="background:#f0f0f0;">
    <button id="top-btn" onclick="window.__clicked = 'top'">Top Button</button>
  </div>
  <div class="section" style="background:#e0e0e0;">
    <button id="mid-btn" onclick="window.__clicked = 'mid'">Middle Button</button>
  </div>
  <div class="section" style="background:#d0d0d0;">
    <button id="bottom-btn" onclick="window.__clicked = 'bottom'">Bottom Button</button>
  </div>
</body>
</html>
